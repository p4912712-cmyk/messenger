<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Мессенджер</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body, #app, #mainApp {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #e5ddd5;
            overflow: hidden;
        }
        .screen {
            height: 100%;
            width: 100%;
            overflow-y: auto;
            background: #f0f2f5;
        }
        .hidden { display: none !important; }
        /* Экран входа */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            background: #075e54;
        }
        .login-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .login-card input, .login-card button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 16px;
        }
        .login-card button {
            background: #075e54;
            color: white;
            border: none;
            cursor: pointer;
        }
        /* Список чатов */
        .chats-header {
            background: #075e54;
            color: white;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chats-list {
            padding: 0;
            list-style: none;
        }
        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: white;
            border-bottom: 1px solid #e9ecef;
            cursor: pointer;
            transition: background 0.2s;
        }
        .chat-item:hover { background: #f5f5f5; }
        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #25d366;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            color: white;
            margin-right: 12px;
        }
        .chat-info { flex: 1; }
        .chat-name { font-weight: 600; margin-bottom: 4px; }
        .chat-last-msg { font-size: 13px; color: #6c757d; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
        /* Экран чата */
        #chatView {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .chat-header {
            background: #075e54;
            color: white;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .back-button {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .back-button:hover { background: #0b6e62; }
        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #25d366;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }
        .chat-header-info { flex: 1; }
        .chat-header-name { font-weight: bold; }
        .call-button {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 15px;
            background: #e5ddd5;
        }
        .message {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 14px;
            position: relative;
        }
        .message.sent {
            background: #dcf8c6;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message.received {
            background: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message-image {
            max-width: 200px;
            border-radius: 12px;
            cursor: pointer;
        }
        .message-audio audio { max-width: 200px; height: 36px; }
        .message-time { font-size: 10px; color: #999; text-align: right; margin-top: 4px; }
        .input-area {
            background: #f0f0f0;
            padding: 10px;
            display: flex;
            gap: 8px;
            align-items: center;
            border-top: 1px solid #ddd;
            flex-shrink: 0;
        }
        .input-area input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 24px;
            outline: none;
            font-size: 14px;
        }
        .icon-button {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .icon-button:hover { background: #e0e0e0; }
        .record-btn.recording { background: #ff4444; color: white; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @media (max-width: 768px) {
            .chat-header { padding: 8px 12px; }
            .back-button { width: 32px; height: 32px; font-size: 20px; }
        }
    </style>
</head>
<body>
<div id="app">
    <!-- Экран входа -->
    <div id="loginScreen" class="screen login-container">
        <div class="login-card">
            <h2>Вход в мессенджер</h2>
            <input type="text" id="usernameInput" placeholder="Ваше имя" autocomplete="off">
            <button id="loginBtn">Войти</button>
            <div id="loginError" style="color:red; margin-top:8px;"></div>
        </div>
    </div>

    <!-- Главный экран после входа -->
    <div id="mainApp" class="screen hidden">
        <!-- Список чатов -->
        <div id="chatsView" class="screen">
            <div class="chats-header">
                <span>Чаты</span>
                <button id="logoutBtn" class="icon-button" style="color:white;">🚪</button>
            </div>
            <div id="chatsList" class="chats-list"></div>
        </div>

        <!-- Экран конкретного чата -->
        <div id="chatView" class="screen hidden">
            <div class="chat-header">
                <button id="backBtn" class="back-button">←</button>
                <div class="chat-header-avatar" id="chatAvatarPlaceholder"></div>
                <div class="chat-header-info">
                    <div id="chatUserName" class="chat-header-name"></div>
                </div>
                <button id="callBtn" class="call-button">📞</button>
            </div>
            <div id="chatMessages" class="messages-area"></div>
            <div class="input-area">
                <button id="attachImageBtn" class="icon-button">📷</button>
                <input type="text" id="messageInput" placeholder="Сообщение">
                <button id="sendTextBtn" class="icon-button">➤</button>
                <button id="recordVoiceBtn" class="icon-button">🎤</button>
            </div>
            <input type="file" id="imageFileInput" accept="image/*" style="display: none;">
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // ------------------- Глобальные переменные -------------------
    let socket;
    let currentUser = null;
    let currentChatWith = null;
    let onlineUsers = [];               // список имён онлайн-пользователей
    let chats = new Map();              // username -> { lastMessage }
    let messagesCache = new Map();      // username -> массив сообщений
    let mediaRecorder;
    let recordedChunks = [];
    let isRecording = false;
    let notificationPermission = false;

    // DOM элементы
    const loginScreen = document.getElementById('loginScreen');
    const mainApp = document.getElementById('mainApp');
    const chatsView = document.getElementById('chatsView');
    const chatView = document.getElementById('chatView');
    const usernameInput = document.getElementById('usernameInput');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');
    const logoutBtn = document.getElementById('logoutBtn');
    const chatsListDiv = document.getElementById('chatsList');
    const backBtn = document.getElementById('backBtn');
    const chatAvatarPlaceholder = document.getElementById('chatAvatarPlaceholder');
    const chatUserName = document.getElementById('chatUserName');
    const callBtn = document.getElementById('callBtn');
    const chatMessagesDiv = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendTextBtn = document.getElementById('sendTextBtn');
    const attachImageBtn = document.getElementById('attachImageBtn');
    const imageFileInput = document.getElementById('imageFileInput');
    const recordVoiceBtn = document.getElementById('recordVoiceBtn');

    // ------------------- Вспомогательные функции -------------------
    function getInitials(name) {
        return name.charAt(0).toUpperCase();
    }

    function updateChatsList() {
        // Сортируем чаты по времени последнего сообщения
        const chatArray = Array.from(chats.values()).sort((a,b) => (b.lastMessage?.timestamp||0) - (a.lastMessage?.timestamp||0));
        chatsListDiv.innerHTML = chatArray.map(chat => `
            <div class="chat-item" data-username="${chat.username}">
                <div class="chat-avatar">${getInitials(chat.username)}</div>
                <div class="chat-info">
                    <div class="chat-name">${escapeHtml(chat.username)}</div>
                    <div class="chat-last-msg">${chat.lastMessage ? (chat.lastMessage.type==='text'?escapeHtml(chat.lastMessage.content):(chat.lastMessage.type==='image'?'📷 Фото':'🎤 Голосовое')) : ''}</div>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.chat-item').forEach(el => {
            el.addEventListener('click', () => openChat(el.dataset.username));
        });
    }

    function addMessageToChatUI(msg, isOwn) {
        const div = document.createElement('div');
        div.className = `message ${isOwn ? 'sent' : 'received'}`;
        if (msg.type === 'text') {
            div.innerHTML = `<div>${escapeHtml(msg.content)}</div><div class="message-time">${msg.time}</div>`;
        } else if (msg.type === 'image') {
            const img = document.createElement('img');
            img.src = msg.content;
            img.className = 'message-image';
            img.style.maxWidth = '200px';
            img.style.borderRadius = '12px';
            div.appendChild(img);
            const timeSpan = document.createElement('div');
            timeSpan.className = 'message-time';
            timeSpan.textContent = msg.time;
            div.appendChild(timeSpan);
        } else if (msg.type === 'voice') {
            const audio = document.createElement('audio');
            audio.controls = true;
            audio.src = msg.content;
            audio.style.maxWidth = '200px';
            div.appendChild(audio);
            const timeSpan = document.createElement('div');
            timeSpan.className = 'message-time';
            timeSpan.textContent = msg.time;
            div.appendChild(timeSpan);
        }
        chatMessagesDiv.appendChild(div);
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }

    function loadChatHistory(username) {
        socket.emit('get history', username);
    }

    function sendMessage(type, content) {
        if (!currentChatWith) return;
        socket.emit('private message', { to: currentChatWith, type, content });
    }

    // Уведомления
    function requestNotificationPermission() {
        if ('Notification' in window) {
            Notification.requestPermission().then(perm => {
                notificationPermission = perm === 'granted';
            });
        }
    }
    function playNotificationSound() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        oscillator.connect(gain);
        gain.connect(audioCtx.destination);
        oscillator.frequency.value = 800;
        gain.gain.value = 0.2;
        oscillator.start();
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
        oscillator.stop(audioCtx.currentTime + 0.5);
    }
    function showNotification(title, body) {
        if (notificationPermission && document.hidden) {
            new Notification(title, { body });
            playNotificationSound();
        }
    }

    // ------------------- Сокет события -------------------
    function setupSocketEvents() {
        socket.on('user list', (users) => {
            onlineUsers = users.map(u => u.username);
            // Обновляем чаты: оставляем только тех, кто онлайн
            for (let [username, chat] of chats.entries()) {
                if (!onlineUsers.includes(username)) {
                    chats.delete(username);
                }
            }
            // Добавляем новых онлайн-пользователей, которых ещё нет в чатах
            for (let username of onlineUsers) {
                if (!chats.has(username)) {
                    chats.set(username, { username, lastMessage: null });
                }
            }
            updateChatsList();
        });

        socket.on('user joined', (user) => {
            if (user.username !== currentUser && !chats.has(user.username)) {
                chats.set(user.username, { username: user.username, lastMessage: null });
                updateChatsList();
            }
        });

        socket.on('user left', (username) => {
            if (chats.has(username)) {
                chats.delete(username);
                updateChatsList();
                // Если текущий чат с ушедшим пользователем, закрываем его
                if (currentChatWith === username) {
                    backBtn.click();
                }
            }
        });

        socket.on('private message', (msg) => {
            const fromMe = msg.from === currentUser;
            const other = fromMe ? msg.to : msg.from;
            // Обновляем последнее сообщение в чате
            if (chats.has(other)) {
                chats.get(other).lastMessage = msg;
                updateChatsList();
            }
            if (currentChatWith === other) {
                addMessageToChatUI(msg, fromMe);
            } else {
                showNotification(msg.from, msg.type === 'text' ? msg.content : (msg.type === 'image' ? '📷 Изображение' : '🎤 Голосовое'));
            }
            if (!messagesCache.has(other)) messagesCache.set(other, []);
            messagesCache.get(other).push(msg);
        });

        socket.on('chat history', ({ target, messages }) => {
            if (currentChatWith === target) {
                chatMessagesDiv.innerHTML = '';
                messages.forEach(m => {
                    addMessageToChatUI(m, m.from === currentUser);
                });
                messagesCache.set(target, messages);
            }
        });
    }

    // ------------------- Открытие чата -------------------
    function openChat(username) {
        currentChatWith = username;
        // Устанавливаем заголовок чата
        chatUserName.textContent = username;
        chatAvatarPlaceholder.textContent = getInitials(username);
        chatsView.classList.add('hidden');
        chatView.classList.remove('hidden');
        chatMessagesDiv.innerHTML = '';
        loadChatHistory(username);
        messageInput.focus();
    }

    // ------------------- Запись голоса -------------------
    async function startRecording() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        recordedChunks = [];
        mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.onloadend = () => {
                sendMessage('voice', reader.result);
            };
            reader.readAsDataURL(blob);
            stream.getTracks().forEach(track => track.stop());
        };
        mediaRecorder.start();
        isRecording = true;
        recordVoiceBtn.classList.add('recording');
    }
    function stopRecording() {
        if (mediaRecorder && isRecording) {
            mediaRecorder.stop();
            isRecording = false;
            recordVoiceBtn.classList.remove('recording');
        }
    }

    // ------------------- Авторизация и запоминание устройства -------------------
    function attemptAutoLogin() {
        const savedUsername = localStorage.getItem('messenger_username');
        if (savedUsername) {
            usernameInput.value = savedUsername;
            login();
        }
    }

    function login() {
        const username = usernameInput.value.trim();
        if (!username) {
            loginError.textContent = 'Введите имя';
            return;
        }
        socket = io();
        socket.emit('register', { username }, (response) => {
            if (response.success) {
                currentUser = username;
                // Сохраняем имя в localStorage
                localStorage.setItem('messenger_username', username);
                loginScreen.classList.add('hidden');
                mainApp.classList.remove('hidden');
                chatsView.classList.remove('hidden');
                chatView.classList.add('hidden');
                setupSocketEvents();
                requestNotificationPermission();
                socket.emit('get users');
            } else {
                loginError.textContent = response.error;
            }
        });
    }

    loginBtn.onclick = login;
    usernameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') login();
    });

    logoutBtn.onclick = () => {
        localStorage.removeItem('messenger_username');
        location.reload();
    };

    backBtn.onclick = () => {
        currentChatWith = null;
        chatView.classList.add('hidden');
        chatsView.classList.remove('hidden');
        updateChatsList();
    };

    callBtn.onclick = () => alert('Функция звонка в разработке');

    sendTextBtn.onclick = () => {
        const text = messageInput.value.trim();
        if (text && currentChatWith) {
            sendMessage('text', text);
            messageInput.value = '';
        }
    };
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendTextBtn.click();
    });

    attachImageBtn.onclick = () => imageFileInput.click();
    imageFileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file && currentChatWith) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                sendMessage('image', ev.target.result);
            };
            reader.readAsDataURL(file);
        }
        imageFileInput.value = '';
    };

    recordVoiceBtn.onmousedown = startRecording;
    recordVoiceBtn.onmouseup = stopRecording;
    recordVoiceBtn.ontouchstart = startRecording;
    recordVoiceBtn.ontouchend = stopRecording;

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Попытка автоматического входа
    attemptAutoLogin();
</script>
</body>
</html>
