<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <style>
        body { font-family: Arial; margin: 0; padding: 20px; background: #e5ddd5; }
        .chat { max-width: 600px; margin: auto; background: white; border-radius: 8px; overflow: hidden; }
        .messages { height: 400px; overflow-y: auto; padding: 10px; background: #e5ddd5; }
        .message { margin: 5px; padding: 8px 12px; border-radius: 12px; max-width: 70%; }
        .my-message { background: #dcf8c6; align-self: flex-end; margin-left: auto; }
        .other-message { background: white; align-self: flex-start; }
        .input-area { display: flex; padding: 10px; background: #f0f0f0; }
        .input-area input { flex: 1; padding: 8px; border: none; border-radius: 20px; }
        .input-area button { background: #075e54; color: white; border: none; border-radius: 50%; width: 40px; cursor: pointer; }
        .login { padding: 20px; text-align: center; }
        .login input { padding: 8px; margin: 5px; }
    </style>
</head>
<body>
<div id="login" class="login">
    <h2>Введите имя</h2>
    <input type="text" id="username" placeholder="Ваше имя">
    <button id="enter">Войти</button>
</div>
<div id="chat" style="display: none;">
    <div class="chat">
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Сообщение">
            <button id="send">➤</button>
        </div>
    </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
    let socket;
    let username = '';

    document.getElementById('enter').onclick = () => {
        username = document.getElementById('username').value.trim();
        if (!username) return;
        document.getElementById('login').style.display = 'none';
        document.getElementById('chat').style.display = 'block';

        socket = io();

        socket.on('chat history', (history) => {
            history.forEach(msg => addMessage(msg));
        });

        socket.on('chat message', (msg) => {
            addMessage(msg);
        });
    };

    function addMessage(msg) {
        const messagesDiv = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = 'message ' + (msg.username === username ? 'my-message' : 'other-message');
        div.innerHTML = `<strong>${msg.username}</strong><br>${msg.text}<br><small>${msg.time}</small>`;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function send() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;
        const msg = {
            username: username,
            text: text,
            time: new Date().toLocaleTimeString()
        };
        socket.emit('chat message', msg);
        input.value = '';
    }

    document.getElementById('send').onclick = send;
    document.getElementById('messageInput').onkeypress = (e) => {
        if (e.key === 'Enter') send();
    };
</script>
</body>
</html>
